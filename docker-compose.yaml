services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hospitalpp
      POSTGRES_USER: hospitalpp
      POSTGRES_PASSWORD: hospitalpp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospitalpp"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: "--jetstream --store_dir /data --http_port 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    container_name: hospitalpp-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://hospitalpp:hospitalpp@postgres:5432/hospitalpp
      NATS_URL: nats://nats:4222
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
      DHA_RESCUE_DIR: /ml_models
      EBM_MODEL_PATH: /ml_models/artifacts/blood_logistics_ebm.pkl
    volumes:
      - ./ml_models:/ml_models:ro
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./app/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000/api/v1
    container_name: hospitalpp-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: unless-stopped

  seed:
    build:
      context: ./app/backend
      dockerfile: Dockerfile
    command: ["python", "seed.py"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hospitalpp:hospitalpp@postgres:5432/hospitalpp
      SEED_HUBS: "${SEED_HUBS:-5}"
      SEED_SPOKES: "${SEED_SPOKES:-20}"
      SEED_FORCE: "${SEED_FORCE:-}"
    depends_on:
      backend:
        condition: service_started
    profiles:
      - seed

volumes:
  pgdata:
  natsdata:
